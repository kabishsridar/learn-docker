services:
  # Container 1: Your FastAPI Application
  web:
    build: .
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/fastapidb
    depends_on:
      - db 

  # Container 2: The Official PostgreSQL Database
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=fastapidb
    ports:
      # Mapped to 5433 on your Ubuntu host to avoid conflicts
      - "5433:5432"
